<mat-card *ngIf="employee; else notFound">
  <mat-card-header>
    <mat-card-title>Employee Details</mat-card-title>
    <mat-card-subtitle>Employee ID: {{ employee.id }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <div class="employee-info">
      <p><strong>Full Name:</strong> {{ employee.firstName }} {{ employee.lastName }}</p>
      <p><strong>Salary:</strong> {{ employee.salary | currency:'INR' }}</p>
      <p><strong>Date of Joining:</strong> {{ employee.doj | date:'dd/MM/yyyy' }}</p>
      <p><strong>Salary Class:</strong> {{ employee.salary | salaryClass }}</p>
    </div>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button color="accent" (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
      Back to List
    </button>
  </mat-card-actions>
</mat-card>

<ng-template #notFound>
  <mat-card>
    <mat-card-content>
      <p>Employee not found.</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="accent" (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
        Back to List
      </button>
    </mat-card-actions>
  </mat-card>
</ng-template>
