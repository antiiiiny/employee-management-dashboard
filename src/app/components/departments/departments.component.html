<div class="departments-container">
  <div class="page-header">
    <h1>Departments Management</h1>
  </div>

  <mat-card class="departments-card">
    <mat-card-content>
      <table mat-table [dataSource]="departments" class="departments-table">
        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Department Name</th>
          <td mat-cell *matCellDef="let element">{{ element.name }}</td>
        </ng-container>

        <!-- Employees Column -->
        <ng-container matColumnDef="employees">
          <th mat-header-cell *matHeaderCellDef>Employee Count</th>
          <td mat-cell *matCellDef="let element">{{ element.employeeCount }}</td>
        </ng-container>

        <!-- Average Salary Column -->
        <ng-container matColumnDef="avgSalary">
          <th mat-header-cell *matHeaderCellDef>Average Salary</th>
          <td mat-cell *matCellDef="let element">{{ element.avgSalary | currency }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
