<div class="reports-container">
  <div class="page-header">
    <h1>Reports</h1>
    <button mat-raised-button color="primary">
      <mat-icon>add</mat-icon>
      Generate Report
    </button>
  </div>

  <mat-card class="reports-card">
    <mat-card-content>
      <table mat-table [dataSource]="reports" class="reports-table">
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let element">{{ element.id }}</td>
        </ng-container>

        <!-- Title Column -->
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Report Title</th>
          <td mat-cell *matCellDef="let element">{{ element.title }}</td>
        </ng-container>

        <!-- Generated By Column -->
        <ng-container matColumnDef="generatedBy">
          <th mat-header-cell *matHeaderCellDef>Generated By</th>
          <td mat-cell *matCellDef="let element">{{ element.generatedBy }}</td>
        </ng-container>

        <!-- Date Column -->
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let element">{{ element.date | date:'dd/MM/yyyy' }}</td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let element">
            <mat-chip
              [color]="element.status === 'Completed' ? 'primary' : 'accent'"
              selected
            >
              {{ element.status }}
            </mat-chip>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="primary" matTooltip="Download" (click)="downloadReport(element.id)">
              <mat-icon>download</mat-icon>
            </button>
            <button mat-icon-button color="warn" matTooltip="Delete" (click)="deleteReport(element.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
